{% load static %}
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
<!--Favicon-->
<link rel="icon" href="{% static 'front/assets/img/favicon.png' %} " type="image/png">
<!-- Bootstrap CSS -->
<link href="{% static 'front/assets/css/bootstrap.min.css' %} " rel="stylesheet">
<!-- Line Awesome CSS -->
<link href="{% static 'front/assets/css/line-awesome.min.css' %} " rel="stylesheet">
<!-- Font Awesome CSS -->
<link href="{% static 'front/assets/css/fontAwesomePro.css' %} " rel="stylesheet">    
<!-- Animate CSS-->
<link href="{% static 'front/assets/css/animate.css' %} " rel="stylesheet">
<!-- Bar Filler CSS -->
<link href="{% static 'front/assets/css/barfiller.css' %} " rel="stylesheet">
<!-- Magnific Popup Video -->
<link href="{% static 'front/assets/css/magnific-popup.css' %} " rel="stylesheet">
<!-- Flaticon CSS -->
<link href="{% static 'front/assets/css/flaticon.css' %} " rel="stylesheet">
<!-- Owl Carousel CSS -->
<link href="{% static 'front/assets/css/owl.carousel.css' %} " rel="stylesheet">
<!-- Slick Slider CSS -->
<link href="{% static 'front/assets/css/slick.css' %} " rel="stylesheet">
<!-- Nice Select  -->
<link href="{% static 'front/assets/css/nice-select.css' %} " rel="stylesheet">
<!-- Back to Top -->
<link href="{% static 'front/assets/css/backToTop.css' %} " rel="stylesheet">
<!-- Metis Menu -->
<link href="{% static 'front/assets/css/metismenu.css' %} " rel="stylesheet">
<!-- Odometer CSS -->
<link href="{% static 'front/assets/css/odometer.min.css' %} " rel="stylesheet">
<!-- FancyBox CSS -->
<link href="{% static 'front/assets/css/fancy-box.min.css' %} " rel="stylesheet">
<!-- Style CSS -->
<link href="{% static 'front/assets/css/style.css' %} " rel="stylesheet">

<style>
    .team-section .team-slider.owl-carousel {
        display: block;
    }
    .team-section .team-slider .single-team-item {
        margin-bottom: 0;
    }
    .team-section .team-slider .team-img img {
        width: 100%;
        height: 320px;
        object-fit: cover;
    }
    .team-section .owl-nav {
        position: absolute;
        top: -70px;
        right: 0;
        display: flex;
        gap: 10px;
    }
    .team-section .owl-nav button {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 1px solid #1B1464;
        background: #fff;
        color: #1B1464;
        font-size: 18px;
        transition: .3s;
    }
    .team-section .owl-nav button:hover {
        background: #F7941D;
        border-color: #F7941D;
        color: #fff;
    }
    .team-section .owl-dots {
        margin-top: 20px;
        text-align: center;
    }
    @media (max-width: 767px) {
        .team-section .owl-nav {
            display: none;
        }
        .team-section .team-slider .team-img img {
            height: 280px;
        }
    }
</style>
