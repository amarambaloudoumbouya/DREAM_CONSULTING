{% load static %}
<div id="partner-1" class="partner-section section-padding pt-0">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-xl-7 col-lg-8 col-md-10 text-center">
                <div class="section-title">
                    <h2 class="visible-slowly-right">Ils nous font <span>confiance</span></h2>
                    <p class="pt-20 wow fadeInUp animated" data-wow-delay=".4s">Nos partenaires et clients qui nous accompagnent pour créer des moments inoubliables.</p>
                </div>
            </div>
        </div>
        <div class="row mt-40">
            <div class="col-12">
                <div class="partner-slider owl-carousel">
                    <div class="single-partner-item">
                        <img src="{% static 'front/assets/img/partner/1.png' %}" alt="Partenaire">
                    </div>
                    <div class="single-partner-item">
                        <img src="{% static 'front/assets/img/partner/2.png' %}" alt="Partenaire">
                    </div>
                    <div class="single-partner-item">
                        <img src="{% static 'front/assets/img/partner/3.png' %}" alt="Partenaire">
                    </div>
                    <div class="single-partner-item">
                        <img src="{% static 'front/assets/img/partner/4.png' %}" alt="Partenaire">
                    </div>
                    <div class="single-partner-item">
                        <img src="{% static 'front/assets/img/partner/5.png' %}" alt="Partenaire">
                    </div>
                    <div class="single-partner-item">
                        <img src="{% static 'front/assets/img/partner/6.png' %}" alt="Partenaire">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .partner-section .single-partner-item {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100px;
    }
    .partner-section .single-partner-item img {
        max-height: 70px;
        width: auto;
        opacity: .55;
        filter: grayscale(100%);
        transition: all .4s ease;
    }
    .partner-section .single-partner-item img:hover {
        opacity: 1;
        filter: grayscale(0);
    }
</style>
